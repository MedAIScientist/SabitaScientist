# SSL override — mounts certificates and enables HTTPS nginx config.
# Requires deploy/nginx/ssl/cert.pem + deploy/nginx/ssl/key.pem
services:
  nginx:
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
